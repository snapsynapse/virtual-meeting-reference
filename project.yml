# Knowledge-as-Code Project Configuration
# Edit this file to define your domain ontology, then run: node scripts/build.js

# ---------------------------------------------------------------------------
# Project identity
# ---------------------------------------------------------------------------
name: "Virtual Meeting Software Guide"
short_name: "meetings"
url: "https://meetings.snapsynapse.com/"
repo: "https://github.com/snapsynapse/virtual-meeting-reference"
description: "A structured reference tracking virtual meeting and classroom platforms, their vendors, and feature capabilities."

# ---------------------------------------------------------------------------
# Entity model — the ontology
#
# Every project has four core entity roles:
#   primary    — stable anchors (e.g., obligations, capabilities, controls)
#   container  — grouping entity (e.g., regulations, products, frameworks)
#   authority  — source entity (e.g., regulatory bodies, vendors, standards orgs)
#   secondary  — mapping entity connecting containers to primaries (e.g., provisions)
#
# The relationship is: Authority → Container → Secondary → Primary
# ---------------------------------------------------------------------------
entities:
  primary:
    name: Feature
    plural: Features
    directory: features
    groups:
      - name: communication
        color: "#4fc3f7"
        color_light: "#0277bd"
      - name: collaboration
        color: "#7c4dff"
        color_light: "#4527a0"
      - name: management
        color: "#ff6e40"
        color_light: "#bf360c"
      - name: engagement
        color: "#66bb6a"
        color_light: "#2e7d32"
    body_sections:
      - Summary
      - What Counts
      - What Does Not Count

  container:
    name: Platform
    plural: Platforms
    directory: platforms
    statuses:
      - name: active
        color: "#4caf50"
        color_light: "#1b7d1b"
      - name: limited
        color: "#ff9800"
        color_light: "#e65100"
      - name: discontinued
        color: "#607d8b"
        color_light: "#455a64"
    has_timeline: true
    scope_field: market

  authority:
    name: Vendor
    plural: Vendors
    directory: vendors

  secondary:
    name: Capability
    plural: Capabilities
    directory: capabilities
    relationship: "supports"

# Mapping file — connects containers to primaries via secondaries
mapping:
  file: "capabilities/index.yml"

# ---------------------------------------------------------------------------
# Site navigation
# ---------------------------------------------------------------------------
nav:
  - id: home
    label: Home
    href: index.html
  - id: containers
    label: Platforms
    href: containers.html
  - id: primaries
    label: Features
    href: primaries.html
  - id: matrix
    label: Matrix
    href: matrix.html
  - id: timeline
    label: Timeline
    href: timeline.html
  - id: compare
    label: Compare
    href: compare.html
  - id: about
    label: About
    href: about.html

# ---------------------------------------------------------------------------
# Bridge pages — SEO-targeted detail pages
# ---------------------------------------------------------------------------
bridges:
  requires: true
  compare: true
  applies_to:
    field: market

# ---------------------------------------------------------------------------
# Theme colors
# ---------------------------------------------------------------------------
theme:
  accent: "#4fc3f7"
  accent_light: "#0055aa"
  accent_bg: "#0f3460"
  accent_bg_light: "#e6f2ff"
